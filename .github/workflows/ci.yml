name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Restore
        run: dotnet restore dotnet-ode.sln

      - name: Build
        run: dotnet build dotnet-ode.sln --no-restore

      - name: Test
        working-directory: tests/DotNetODE.Tests
        run: dotnet test
