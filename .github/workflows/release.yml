name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore dotnet-ode.sln

      - name: Build
        run: dotnet build dotnet-ode.sln --configuration Release --no-restore

      - name: Test
        working-directory: tests/DotNetODE.Tests
        run: dotnet test --configuration Release

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PROJECT_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/DotNetODE/DotNetODE.csproj)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match DotNetODE.csproj version ($PROJECT_VERSION)."
            exit 1
          fi

      - name: Pack
        run: dotnet pack src/DotNetODE/DotNetODE.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet.org with Trusted Publishing
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push ./artifacts/*.snupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
