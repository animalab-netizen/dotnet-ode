name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Restore
        run: dotnet restore dotnet-ode.sln

      - name: Build
        run: dotnet build dotnet-ode.sln --configuration Release --no-restore

      - name: Run validation
        working-directory: tests/DotNetODE.Tests
        run: dotnet test

      - name: Pack
        run: dotnet pack src/DotNetODE/DotNetODE.csproj --configuration Release --no-build -o ./artifacts

  publish:
    runs-on: ubuntu-latest
    needs: verify

    permissions:
      contents: write

    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PROJECT_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/DotNetODE/DotNetODE.csproj)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match DotNetODE.csproj version ($PROJECT_VERSION)."
            exit 1
          fi

      - name: Pack
        run: dotnet pack src/DotNetODE/DotNetODE.csproj -c Release -o ./artifacts

      - name: Publish to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          dotnet nuget push "./artifacts/*.snupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
